name: ETF 데이터 자동 업데이트

on:
  schedule:
    # KST 새벽 7-11시 (UTC 22-02시): 미국 장 마감 후 iShares 업데이트 감지
    - cron: '0 22-23 * * 1-5'   # UTC 22-23 = KST 07-08시 (화-토 새벽)
    - cron: '0 0-2 * * 2-6'     # UTC 00-02 = KST 09-11시
    # KST 낮 시간 (UTC 03-09시): 놓친 업데이트 캐치
    - cron: '0 3,6,9 * * 1-5'   # UTC 03,06,09 = KST 12,15,18시
  workflow_dispatch:             # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas beautifulsoup4 openpyxl lxml yfinance

      - name: 데이터 수집 엔진 가동 (BSOL, IBIT, ETHA)
        run: |
          python bsol.py
          python ibit.py
          python etha.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */*.csv
          git diff --cached --quiet || git commit -m "자동 업데이트: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
