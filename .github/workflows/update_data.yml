name: ETF 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 */3 * * *'       # 매 3시간마다 (매일 24시간)
  workflow_dispatch:             # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 엔진 가동 (BSOL, IBIT, ETHA)
        run: |
          python bsol.py
          python ibit.py
          python etha.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */*.csv
          git diff --cached --quiet || git commit -m "자동 업데이트: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
